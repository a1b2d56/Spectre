name: Build APK

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 4. Make gradlew executable ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. Decode keystore ─────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/spectre.jks

      # ── 6. Build & Sign Release APK ────────────────────────────────────────
      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/spectre.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace

      # ── 7. Rename APK with version + short commit SHA ──────────────────────
      - name: Rename APK
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "APK_NAME=Spectre-${VERSION}-release-${SHA}.apk" >> $GITHUB_ENV
          mv app/build/outputs/apk/release/app-release.apk \
             Spectre-${VERSION}-release-${SHA}.apk

      # ── 8. Upload as workflow artifact ─────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 90

      # ── 9. Attach to GitHub Release if triggered by a version tag ──────────
      #   Push a tag like v1.8.4 to create a release:
      #     git tag v1.8.4 && git push origin v1.8.4
      - name: Extract changelog for this version
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"          # e.g. v1.8.4
          VERSION_NUM="${VERSION#v}"                 # e.g. 1.8.4
          # Extract the block between this version header and the next ## header
          NOTES=$(awk "/^## \[${VERSION_NUM}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          # Pass multiline string to next step via env file
          {
            echo "NOTES<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_ENV

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_NAME }}
          name: "Spectre ${{ github.ref_name }}"
          body: ${{ env.NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

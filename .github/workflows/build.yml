name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 4. Make gradlew executable ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. Build Debug APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 6. Decode keystore ─────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/spectre.jks

      # ── 7. Build & Sign Release APK ────────────────────────────────────────
      - name: Build Release APK (signed)
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/spectre.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace

      # ── 8. Rename APKs with version + short commit SHA ────────────────────
      - name: Rename APKs
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHA=$SHA" >> $GITHUB_ENV

          mv app/build/outputs/apk/debug/app-debug.apk \
             Spectre-${VERSION}-debug-${SHA}.apk

          mv app/build/outputs/apk/release/app-release.apk \
             Spectre-${VERSION}-release-${SHA}.apk

      # ── 9. Upload Debug APK as workflow artifact ───────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Spectre-${{ env.VERSION }}-debug-${{ env.SHA }}
          path: Spectre-*-debug-*.apk
          retention-days: 14

      # ── 10. Upload Release APK as workflow artifact ───────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Spectre-${{ env.VERSION }}-release-${{ env.SHA }}
          path: Spectre-*-release-*.apk
          retention-days: 90

  # ── Release job: runs only when a version tag like v1.8.4 is pushed ───────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          pattern: Spectre-*-release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Spectre-*-release-*.apk
          generate_release_notes: true
          name: "Spectre ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
